<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner Coreo Bosco</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #0056b3; --success: #28a745; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        
        .result-card { display: none; padding: 15px; border-radius: 8px; margin-top: 15px; font-weight: bold; font-size: 1.1em; }
        .info { background: #eef7ff; color: #004085; border: 1px solid #b8daff; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        button { padding: 12px 20px; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-blue { background: var(--primary); }
        .btn-blue:hover { background: #004494; }
        .btn-green { background: var(--success); font-weight: bold; font-size: 18px; }
        .btn-green:hover { background: #218838; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .detalles { font-size: 0.9em; font-weight: normal; margin-top: 10px; text-align: left; background: white; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--primary); margin-top: 0;">Control de Puerta</h2>
    
    <div id="reader"></div>

    <div id="resultado" class="result-card">
        <span id="mensajeEstado">Escaneando...</span>
        <div id="detallesCliente" class="detalles" style="display:none;"></div>
    </div>

    <button id="btnMarcarUsado" class="btn-green" style="display:none;" onclick="procesarUsoTicket()">🎟️ Marcar Entrada como Usada</button>
    
    <button id="btnEscanear" class="btn-blue" style="display:none;" onclick="reiniciarEscaneo()">Escanear Siguiente Ticket</button>
</div>

<script>
    const APP_URL = "TU_URL_DE_APPS_SCRIPT_AQUI"; // <--- NO OLVIDES PEGAR TU URL AQUÍ
    let html5QrcodeScanner;
    let qrDataActual = null; // Guardará los datos del QR temporalmente

    function iniciarEscaner() {
        html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    // 1. Detecta el QR y muestra la info (pero NO actualiza el Excel aún)
    function onScanSuccess(decodedText, decodedResult) {
        html5QrcodeScanner.pause(); // Pausar cámara
        
        const uiResultado = document.getElementById('resultado');
        const uiMensaje = document.getElementById('mensajeEstado');
        const uiDetalles = document.getElementById('detallesCliente');
        const btnMarcar = document.getElementById('btnMarcarUsado');
        const btnSiguiente = document.getElementById('btnEscanear');

        try {
            qrDataActual = JSON.parse(decodedText);
            
            // Validación local rápida (Si el administrador no marcó Correcto/Validado al generar)
            if (qrDataActual.Estado_Pago !== "Correcto" && qrDataActual.Estado_Pago !== "Validado") {
                uiResultado.className = 'result-card error';
                uiMensaje.innerText = "⚠️ ADVERTENCIA: PAGO NO VALIDADO";
                uiResultado.style.display = 'block';
                btnSiguiente.style.display = 'block';
                return; // Se detiene aquí, no muestra el botón verde
            }

            // Mostrar los datos leídos
            uiResultado.className = 'result-card info';
            uiMensaje.innerText = "Ticket Identificado";
            uiDetalles.style.display = 'block';
            uiDetalles.innerHTML = `
                <strong>Titular:</strong> ${qrDataActual.Nombre}<br>
                <strong>N° Entradas:</strong> ${qrDataActual.Entradas}<br>
                <strong>Fila en Sheet:</strong> ${qrDataActual.Fila}
            `;
            
            uiResultado.style.display = 'block';
            btnMarcar.style.display = 'block'; // Mostrar el botón manual

        } catch (error) {
            uiResultado.style.display = 'block';
            uiResultado.className = 'result-card error';
            uiMensaje.innerText = "❌ QR INVÁLIDO O DAÑADO";
            btnSiguiente.style.display = 'block';
        }
    }

    // 2. Al presionar el botón verde, se envía la orden al Google Sheets
    async function procesarUsoTicket() {
        const btnMarcar = document.getElementById('btnMarcarUsado');
        const uiResultado = document.getElementById('resultado');
        const uiMensaje = document.getElementById('mensajeEstado');
        const btnSiguiente = document.getElementById('btnEscanear');

        btnMarcar.disabled = true;
        btnMarcar.innerText = "⏳ Procesando...";

        try {
            await fetch(APP_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'marcar_usado', // Acción específica
                    qrData: qrDataActual
                })
            });

            // Éxito visual
            uiResultado.className = 'result-card success';
            uiMensaje.innerText = "✅ ACCESO PERMITIDO Y REGISTRADO";
            btnMarcar.style.display = 'none'; // Ocultar botón verde
            btnSiguiente.style.display = 'block'; // Mostrar botón de siguiente

        } catch (error) {
            alert("Error de conexión. Verifica el internet.");
        } finally {
            btnMarcar.disabled = false;
            btnMarcar.innerText = "🎟️ Marcar Entrada como Usada";
        }
    }

    function onScanFailure(error) { /* Ignorar */ }

    function reiniciarEscaneo() {
        document.getElementById('resultado').style.display = 'none';
        document.getElementById('btnMarcarUsado').style.display = 'none';
        document.getElementById('btnEscanear').style.display = 'none';
        qrDataActual = null;
        html5QrcodeScanner.resume(); // Reanudar cámara
    }

    iniciarEscaner();
</script>

</body>
</html>
